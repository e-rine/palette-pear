<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Journal</title>
  <link rel="stylesheet" href="/styles/journal.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="navbar-placeholder"></div>
  <script src="/scripts/nav-bar.js"></script> 
  
  <div class="page-wrapper">

    <!-- HERO SECTION -->
    <section class="hero">
      <div class="hero-content">
        <h1>My Logbook & Journal</h1>
        <p>
          A quiet place for thoughts, reflections, and all the little things worth remembering.
        </p>
        <div class="palette">
          <span class="color c1"></span>
          <span class="color c2"></span>
          <span class="color c3"></span>
          <span class="color c4"></span>
          <span class="color c5"></span>
        </div>
        <div class="hero-sub-links">
          <a href="logbook.html">Logbook</a>
          <a href="journal.html" class="hero-sub-active">Journal</a>
        </div>
        <button class="add-btn">+ Add to Journal</button>
      </div>
    </section>

    <!-- TABS -->
    <section class="tabs-section">
      <div class="tabs-wrapper">

        <!-- WRITINGS (fetched from addedjournals.json — journals you liked in the Logbook) -->
        <div class="tab-group writings">
          <button class="tab-header">
            <img src="/assets/images/journal_tab.png" alt="Writings">
          </button>
          <div class="folder-overlay">
            <img class="folder-img" src="/assets/images/journal_folder.png" alt="">
            <div class="folder-entries writings-folder-entries">
              <div class="pinned-row" id="writing-pinned-row">
                <!-- Populated by journal.js from addedjournals.json -->
              </div>
            </div>
          </div>
        </div>

        <!-- MY ENTRIES (fetched from myentries.json / localStorage) -->
        <div class="tab-group entries">
          <button class="tab-header">
            <img src="/assets/images/entries_tab.png" alt="My Entries">
          </button>
          <div class="folder-overlay">
            <img class="folder-img" src="/assets/images/entries_folder.png" alt="">
            <div class="folder-entries entries-folder-entries">
              <div class="pinned-row" id="entry-card-list">
                <!-- Populated by journal.js -->
              </div>
            </div>
          </div>
        </div>

      </div>
    </section>

  </div>

  <!-- ═══════════════════════════════════════════
       WRITING MODAL (read-only, from logbook)
  ═══════════════════════════════════════════ -->
  <div class="modal-overlay" id="writingModalOverlay">
    <div class="modal" id="writingModal">
      <button class="modal-close" id="writingModalClose">✕</button>
      <div class="entry-modal-hero" id="writingModalHero">
        <img id="writingModalHeroImg" src="" alt="" style="display:none; width:100%; height:100%; object-fit:cover;">
        <div class="entry-modal-hero-placeholder" id="writingModalHeroPlaceholder">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect x="6" y="10" width="36" height="28" rx="4" stroke="#c7828e" stroke-width="1.8" fill="none" opacity="0.4"/>
            <circle cx="16.5" cy="20.5" r="3.5" fill="#c7828e" opacity="0.4"/>
            <path d="M6 32l10-9 7 7 6-5 9 6" stroke="#c7828e" stroke-width="1.8" fill="none" stroke-linejoin="round" opacity="0.4"/>
          </svg>
          <span>No image attached</span>
        </div>
      </div>
      <div class="modal-body">
        <p class="modal-label" id="writingModalLabel"></p>
        <p class="modal-title" id="writingModalTitle"></p>
        <p class="modal-author" id="writingModalAuthor"></p>
        <p class="modal-content" id="writingModalContent"></p>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       ENTRY VIEW MODAL (with Edit + Delete)
  ═══════════════════════════════════════════ -->
  <div class="modal-overlay" id="entryModalOverlay">
    <div class="modal" id="entryModal">
      <button class="modal-close" id="entryModalClose">✕</button>
      <div class="entry-modal-hero" id="entryModalHero">
        <img id="entryModalHeroImg" src="" alt="" style="display:none; width:100%; height:100%; object-fit:cover;">
        <div class="entry-modal-hero-placeholder" id="entryModalHeroPlaceholder">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect x="6" y="10" width="36" height="28" rx="4" stroke="#c7828e" stroke-width="1.8" fill="none" opacity="0.4"/>
            <circle cx="16.5" cy="20.5" r="3.5" fill="#c7828e" opacity="0.4"/>
            <path d="M6 32l10-9 7 7 6-5 9 6" stroke="#c7828e" stroke-width="1.8" fill="none" stroke-linejoin="round" opacity="0.4"/>
          </svg>
          <span>No image attached</span>
        </div>
      </div>
      <div class="modal-body">
        <div class="modal-title-row">
          <p class="modal-title" id="entryModalTitle"></p>
          <span class="modal-badge" id="entryModalBadge"></span>
        </div>
        <p class="modal-author" id="entryModalMeta"></p>
        <p class="modal-author" id="entryModalDate"></p>
        <p class="modal-content" id="entryModalDesc"></p>

        <!-- CRUD actions -->
        <div class="entry-modal-actions">
          <button class="entry-action-btn entry-edit-btn" id="entryModalEdit">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="margin-right:5px;vertical-align:-1px">
              <path d="M9.5 2L12 4.5 4.5 12H2V9.5L9.5 2Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
            </svg>
            Edit
          </button>
          <button class="entry-action-btn entry-delete-btn" id="entryModalDelete">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="margin-right:5px;vertical-align:-1px">
              <path d="M2 3.5h10M5.5 3.5V2.5h3v1M5 5.5l.5 5M9 5.5l-.5 5M3.5 3.5l.5 8h6l.5-8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Delete
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       ADD / EDIT ENTRY MODAL
  ═══════════════════════════════════════════ -->
  <div class="modal-overlay" id="addEntryOverlay">
    <div class="modal add-entry-modal" id="addEntryModal">
      <button class="modal-close" id="addEntryClose">✕</button>

      <!-- Mode tag (New Entry / Edit Entry) -->
      <div class="add-entry-mode-tag" id="addEntryModeTag">New Entry</div>

      <!-- Thumbnail zone -->
      <div class="add-entry-thumb" id="addEntryThumb">
        <input type="file" accept="image/*" id="addEntryImgInput" style="display:none">
        <div class="add-entry-thumb-placeholder" id="addEntryThumbPlaceholder">
          <div class="add-entry-thumb-icon">
            <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
              <rect x="6" y="10" width="32" height="24" rx="3" stroke="#aaa" stroke-width="2" fill="none"/>
              <circle cx="15" cy="19" r="3" fill="#aaa"/>
              <path d="M6 30l8-7 6 6 5-4 7 5" stroke="#aaa" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="add-entry-thumb-label">+ Add a thumbnail</span>
        </div>
        <img id="addEntryThumbPreview" src="" alt="" style="display:none; width:100%; height:100%; object-fit:cover; border-radius:12px 12px 0 0;">
      </div>

      <div class="add-entry-body">

        <!-- Title -->
        <input
          class="add-entry-title-input"
          id="addEntryTitle"
          type="text"
          placeholder="Title your entry"
          maxlength="80"
        >
        <div class="add-entry-divider"></div>

        <!-- Body -->
        <textarea
          class="add-entry-textarea"
          id="addEntryBody"
          placeholder="Start writing..."
        ></textarea>

        <!-- Footer row -->
        <div class="add-entry-footer">
          <div class="add-entry-footer-right">
            <button class="add-entry-btn priv-btn" id="addEntryPrivate">Private</button>
            <button class="add-entry-btn post-btn"  id="addEntryPost">Post</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script type="module" src="/scripts/journal.js"></script>
</body>
</html>
